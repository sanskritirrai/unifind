<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniFind | Search Items</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, system-ui, sans-serif;
}

body{
    background:#f4f7fb;
    color:#0f172a;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:26px 70px;
}

.logo{
    font-size:26px;
    font-weight:800;
}

.back{
    background:#4f6ef7;
    color:#fff;
    padding:10px 22px;
    border-radius:30px;
    border:none;
    font-weight:600;
    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:20px 70px 60px;
}

h1{
    font-size:38px;
    margin-bottom:8px;
}

.sub{
    color:#64748b;
    margin-bottom:30px;
    font-size:17px;
}

/* FILTERS */
.filters{
    background:#ffffff;
    padding:24px;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr;
    gap:20px;
    margin-bottom:35px;
}

label{
    font-weight:600;
    font-size:14px;
}

input, select{
    width:100%;
    padding:12px 14px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    font-size:14px;
}

/* RESULTS */
.results{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:28px;
}

.card{
    background:#fff;
    border-radius:22px;
    padding:24px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 30px 60px rgba(0,0,0,0.12);
}

.tag{
    display:inline-block;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    margin-bottom:12px;
}

.lost{
    background:#fee2e2;
    color:#b91c1c;
}

.found{
    background:#dcfce7;
    color:#166534;
}

.item-name{
    font-size:20px;
    font-weight:800;
    margin-bottom:8px;
}

.meta{
    font-size:14px;
    color:#64748b;
    margin-bottom:6px;
}

.empty{
    color:#64748b;
    font-size:18px;
    margin-top:40px;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">UniFind</div>
    <button class="back" onclick="goBack()">Back to Dashboard</button>
</div>

<div class="container">
    <h1>Search Items</h1>
    <p class="sub">Find lost or found items reported on campus</p>

    <!-- FILTERS -->
    <div class="filters">
        <div>
            <label>Search Item</label>
            <input type="text" id="searchInput" placeholder="e.g. Wallet, Phone">
        </div>

        <div>
            <label>Category</label>
            <select id="categoryFilter" title="Filter items by category">
                <option value="">All</option>
                <option>Electronics</option>
                <option>Documents / ID</option>
                <option>Books</option>
                <option>Accessories</option>
                <option>Other</option>
            </select>
        </div>

        <div>
            <label>Location</label>
            <select id="locationFilter" title="Filter items by location">
                <option value="">All</option>
                <option>Library</option>
                <option>Classroom</option>
                <option>Cafeteria</option>
                <option>Hostel</option>
                <option>Sports Complex</option>
                <option>Parking Area</option>
            </select>
        </div>

        <div>
            <label>Status</label>
            <select id="statusFilter" title="Filter items by status">
                <option value="">All</option>
                <option value="Lost">Lost</option>
                <option value="Found">Found</option>
            </select>
        </div>
    </div>

    <div class="results" id="results"></div>
</div>

<script>
    const resultsDiv = document.getElementById("results");
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");
const locationFilter = document.getElementById("locationFilter");
const statusFilter = document.getElementById("statusFilter");
    const user = JSON.parse(localStorage.getItem("user"));
    if(!user){
        window.location.href = "index.html";
    }
async function renderItems(){
    const name = searchInput.value;
    const category = categoryFilter.value;
    const location = locationFilter.value;
    const status = statusFilter.value;

    const res = await fetch(
        `http://localhost:3000/search?name=${name}&category=${category}&location=${location}&status=${status}`
    );

    const items = await res.json();

    resultsDiv.innerHTML = "";

    if(items.length === 0){
        resultsDiv.innerHTML = `<div class="empty">No items found</div>`;
        return;
    }

    items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
    <img src="http://localhost:3000/uploads/${item.image}" width="100" style="border-radius:10px; margin-bottom:10px;">

    <span class="tag ${item.status === "Lost" ? "lost" : "found"}">
        ${item.status}
    </span>

    <div class="item-name">${item.item_name}</div>
    <div class="meta">Category: ${item.category}</div>
    <div class="meta">Location: ${item.location}</div>
`;

        resultsDiv.appendChild(card);
    });
}
renderItems();

document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", renderItems);
});

function goBack(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
