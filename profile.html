<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniFind | Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, system-ui, sans-serif;
}

body{
    background:#f4f7fb;
    color:#0f172a;
}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:26px 70px;
}

.logo{
    font-size:26px;
    font-weight:800;
}

.back{
    background:#4f6ef7;
    color:#fff;
    padding:10px 22px;
    border-radius:30px;
    border:none;
    font-weight:600;
    cursor:pointer;
}

.container{
    padding:20px 70px 60px;
}

h1{
    font-size:38px;
    margin-bottom:6px;
}

.sub{
    color:#64748b;
    margin-bottom:30px;
    font-size:17px;
}

.grid{
    display:grid;
    grid-template-columns: 1.2fr 2fr;
    gap:30px;
}

.profile-card{
    background:#fff;
    border-radius:22px;
    padding:28px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
    text-align:center;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#e0e7ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:800;
    margin:0 auto 16px;
}

.name{
    font-size:22px;
    font-weight:800;
}

.role{
    font-size:14px;
    color:#64748b;
    margin-bottom:20px;
}

.stat-box{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.stat{
    background:#f1f5f9;
    border-radius:14px;
    padding:14px;
}

.stat h3{
    font-size:22px;
    font-weight:800;
}

.stat p{
    font-size:12px;
    color:#64748b;
}

.form-card{
    background:#fff;
    border-radius:22px;
    padding:32px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    font-size:14px;
    font-weight:700;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid #cbd5f5;
    font-size:14px;
}

input:disabled{
    background:#f1f5f9;
    color:#64748b;
}

.actions{
    display:flex;
    gap:14px;
    margin-top:20px;
}

.save{
    background:#4f6ef7;
    color:#fff;
    padding:12px 26px;
    border:none;
    border-radius:30px;
    font-weight:700;
    cursor:pointer;
}

.edit{
    background:#e0e7ff;
    color:#1e3a8a;
    padding:12px 26px;
    border:none;
    border-radius:30px;
    font-weight:700;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">UniFind</div>
    <button class="back" onclick="goBack()">Back to Dashboard</button>
</div>

<div class="container">
    <h1>Profile</h1>
    <p class="sub">View and update your student information</p>

    <div class="grid">

        <!-- LEFT -->
        <div class="profile-card">
            <div class="avatar">S</div>
            <div class="name">Student Name</div>
            <div class="role">KRMU Student</div>

            <div class="stat-box">
                <div class="stat">
                    <h3>5</h3>
                    <p>Lost</p>
                </div>
                <div class="stat">
                    <h3>3</h3>
                    <p>Found</p>
                </div>
                <div class="stat">
                    <h3>2</h3>
                    <p>Returned</p>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="form-card">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" value="Student Name" placeholder="Full Name" disabled>
            </div>

            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" value="student@krmu.edu.in" placeholder="University Email" disabled>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" value="9876543210" disabled id="phone" placeholder="Phone Number">
            </div>

            <div class="form-group">
                <label for="dept">Department</label>
                <input type="text" value="Computer Science" disabled id="dept" placeholder="Department">
            </div>

            <div class="actions">
                <button class="edit" onclick="enableEdit()">Edit</button>
                <button class="save" onclick="saveProfile()">Save</button>
            </div>
        </div>

    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem("user"));
    if(!user){
        window.location.href = "index.html";
    }
function enableEdit(){
    document.getElementById("phone").disabled = false;
    document.getElementById("dept").disabled = false;
}

async function saveProfile(){
    const phone = document.getElementById("phone").value;
    const dept = document.getElementById("dept").value;

    const user = JSON.parse(localStorage.getItem("user"));

    const res = await fetch("http://localhost:3000/update-profile", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            id: user.id,
            phone,
            dept
        })
    });

    alert(await res.text());

    document.getElementById("phone").disabled = true;
    document.getElementById("dept").disabled = true;
}

function goBack(){
    window.location.href = "dashboard.html";
}

document.getElementById("name").value = user.name;
document.getElementById("email").value = user.email;
</script>

</body>
</html>
