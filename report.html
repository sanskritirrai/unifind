<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniFind | My Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, system-ui, sans-serif;
}

body{
    background:#f4f7fb;
    color:#0f172a;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:26px 70px;
}

.logo{
    font-size:26px;
    font-weight:800;
}

.back{
    background:#4f6ef7;
    color:#fff;
    padding:10px 22px;
    border-radius:30px;
    border:none;
    font-weight:600;
    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:20px 70px 60px;
}

h1{
    font-size:38px;
    margin-bottom:8px;
}

.sub{
    color:#64748b;
    margin-bottom:30px;
    font-size:17px;
}

/* LIST */
.list{
    display:grid;
    gap:22px;
}

.card{
    background:#fff;
    border-radius:22px;
    padding:26px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    max-width:70%;
}

.type{
    display:inline-block;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    margin-bottom:10px;
}

.lost{
    background:#fee2e2;
    color:#b91c1c;
}

.found{
    background:#dcfce7;
    color:#166534;
}

.title{
    font-size:20px;
    font-weight:800;
    margin-bottom:6px;
}

.meta{
    font-size:14px;
    color:#64748b;
}

/* RIGHT */
.right{
    text-align:right;
}

.status{
    display:inline-block;
    padding:8px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    margin-bottom:10px;
}

.pending{
    background:#fef3c7;
    color:#92400e;
}

.approved{
    background:#e0e7ff;
    color:#3730a3;
}

.returned{
    background:#dcfce7;
    color:#166534;
}

.delete{
    background:none;
    border:none;
    color:#ef4444;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">UniFind</div>
    <button class="back" onclick="goBack()">Back to Dashboard</button>
</div>

<div class="container">
    <h1>My Reports</h1>
    <p class="sub">Track and manage your lost and found submissions</p>

    <div class="list" id="reportList"></div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user){
    window.location.href = "index.html";
}

const list = document.getElementById("reportList");

async function renderReports(){
    const res = await fetch(`http://localhost:3000/my-reports/${user.id}`);
    const reports = await res.json();

    list.innerHTML = "";

    if(reports.length === 0){
        list.innerHTML = "<p class='sub'>No reports found</p>";
        return;
    }

    reports.forEach((r) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
    <div class="left">
        <img src="http://localhost:3000/uploads/${r.image}" width="80" style="border-radius:10px; margin-bottom:10px;">
        
        <span class="type ${r.type === "Lost" ? "lost" : "found"}">
            ${r.type}
        </span>

        <div class="title">${r.item_name}</div>
        <div class="meta">Location: ${r.location} • Date: ${r.date}</div>
    </div>

            <div class="right">
                <div class="status ${(r.status || "Pending").toLowerCase()}">
                    ${r.status || "Pending"}
                </div>
            </div>
        `;

        list.appendChild(card);
    });
}

renderReports();

function goBack(){
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
