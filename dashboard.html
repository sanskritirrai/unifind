<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniFind | Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, system-ui, sans-serif;
}

body{
    background:#f4f7fb;
    color:#0f172a;
}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:28px 70px;
}

.logo{
    font-size:26px;
    font-weight:800;
}

.logout{
    background:#4f6ef7;
    color:#fff;
    padding:12px 22px;
    border-radius:30px;
    border:none;
    font-weight:600;
    cursor:pointer;
}

.container{
    padding:20px 70px;
}

h1{
    font-size:40px;
    margin-bottom:8px;
}

.sub{
    color:#64748b;
    margin-bottom:40px;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:28px;
}

.card{
    background:#fff;
    border-radius:22px;
    padding:28px;
    box-shadow:0 20px 40px rgba(0,0,0,0.06);
    min-height:120px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    transition:0.3s;
}

.card.clickable{
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 30px 60px rgba(0,0,0,0.12);
}

.stat-title{
    color:#64748b;
    font-weight:600;
    margin-bottom:10px;
}

.stat{
    font-size:40px;
    font-weight:800;
}

.action{
    text-align:center;
    font-size:20px;
    font-weight:700;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">UniFind</div>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">
    <h1>Student Dashboard</h1>
    <p class="sub">Manage lost & found items securely</p>

    <div class="grid">

        <div class="card">
            <div class="stat-title">Items Reported</div>
            <div class="stat">128</div>
        </div>

        <div class="card">
            <div class="stat-title">Items Returned</div>
            <div class="stat">96</div>
        </div>

        <div class="card">
            <div class="stat-title">Pending Claims</div>
            <div class="stat">14</div>
        </div>

        <div class="card clickable" onclick="window.location.href='report-lost.html'">
            <div class="action">Report Lost Item</div>
        </div>

        <div class="card clickable" onclick="window.location.href='report-found.html'">
            <div class="action">Report Found Item</div>
        </div>

        <div class="card clickable" onclick="window.location.href='search.html'">
          <div class="action">Search Items</div>
        </div>


        <div class="card clickable" onclick="window.location.href='report.html'">
            <div class="action">My Reports</div>
        </div>

        <div class="card clickable" onclick="window.location.href='notifications.html'">
            <div class="action">Notifications</div>
        </div>

        <div class="card clickable" onclick="window.location.href='profile.html'">
            <div class="action">Profile</div>
        </div>

    </div>
  </div>
  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if(!user){
        window.location.href = "index.html";
    }
    function logout() {
        localStorage.removeItem("user");
        window.location.href = "index.html";
    }

fetch(`http://localhost:3000/stats/${user.id}`)
.then(res=>res.json())
.then(data=>{
    document.querySelectorAll(".stat")[0].innerText = data.lost;
    document.querySelectorAll(".stat")[1].innerText = data.found;
});
  </script>

</body>
</html>
